appId: com.cpxlabs.lillysbox
---
- launchApp

# Handle Login Screen (if not already authenticated)
- runFlow:
    when:
      visible: "Play as Guest"
    commands:
        - tapOn: "Play as Guest"

# Wait for Game Selection Screen
- extendedWaitUntil:
    visible: "Pet Care"
    timeout: 10000

# Tap the Lilly's Box game card
- tapOn: "Pet Care.*"

# Wait for Pet Care Menu Screen
- extendedWaitUntil:
    visible: "🐾 Pet Care"
    timeout: 10000

# Handling Existing State
# If "Continue with..." is visible, it means a pet exists. We want to clear it.
- runFlow:
    when:
      visible: "Continue with.*"
    commands:
        - tapOn: "Delete Pet.*"
        - tapOn: "Delete" # Modal confirm button

# Create New Pet Flow
- tapOn: "Create New Pet.*" # Matches "Create New Pet ✨"

# Create Pet Screen
- extendedWaitUntil:
    visible: "🐾 Create New Pet"
    timeout: 5000

- tapOn: "Cat" # Accessibility Label
- tapOn: "Pet name.*"
- inputText: "Maestro"
- hideKeyboard
- tapOn: "Create Pet!.*" # Matches "Create Pet! 🎉"

# Home Screen Verification
- extendedWaitUntil:
    visible: "Maestro"
    timeout: 5000

- assertVisible: "Feed"
- assertVisible: "Bath"
- assertVisible: "Play"
- assertVisible: "Sleep"
- assertVisible: "Veterinarian" # or "Vet!" depending on status
