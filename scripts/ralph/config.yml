# Ralph Loops Configuration
version: "1.0"

# Global settings
settings:
  log_level: INFO
  max_workers: 4
  timeout: 300

# Data sources
sources:
  # Example: Game analytics data
  game_events:
    type: file
    path: ./data/events
    format: json

  # Example: User data
  user_data:
    type: file
    path: ./data/users
    format: csv

# Processing pipelines
pipelines:
  # Example: Process game events
  process_events:
    source: game_events
    steps:
      - type: transform
        operation: parse_json
      - type: filter
        condition: "event_type == 'pet_interaction'"
      - type: aggregate
        group_by: user_id
        metrics:
          - count
          - avg: duration
    output:
      type: file
      path: ./output/processed_events.json

# Scheduling (for loops)
schedules:
  daily_analytics:
    pipeline: process_events
    cron: "0 0 * * *"  # Run daily at midnight
    enabled: false
